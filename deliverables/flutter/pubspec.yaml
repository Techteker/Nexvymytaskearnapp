name: nexvy
description: "Nexvy - India's Smart Rewards Earning Platform. Complete surveys, tasks, refers, and watch rewarding ads for real cash payouts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase Base Services
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.5
  firebase_messaging: ^14.7.1
  firebase_analytics: ^10.7.1
  firebase_crashlytics: ^3.4.1

  # Native Performance & Design Assets
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  webview_flutter: ^4.4.2  # Controlled in bottom modal for in-app surveys
  local_auth: ^2.1.8       # Biometric protection for payout screens
  hive_flutter: ^1.1.0     # Ultrafast offline persistence of credentials

  # Real-time Indian payment webhooks & ads
  razorpay_flutter: ^1.3.5
  google_mobile_ads: ^4.0.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.4
  package_info_plus: ^5.0.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/animations/confetti.json
    - assets/animations/coin_rain.json
    - assets/illustrations/onboarding_1.json
    - assets/illustrations/onboarding_2.json
    - assets/illustrations/onboarding_3.json

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Bold.ttf
          weight: 700
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono-Medium.ttf
          weight: 500
